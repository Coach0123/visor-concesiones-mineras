<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Concesiones Mineras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 350px; background: #f5f5f5; padding: 20px; overflow-y: auto; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #e5e5e5; }
        h2 { color: #333; margin-bottom: 20px; }
        h3 { color: #555; margin: 15px 0 10px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        input, button { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #4CAF50; color: white; cursor: pointer; }
        button:hover { background: #45a049; }
        .leyenda-item { display: flex; align-items: center; margin-bottom: 8px; }
        .color-box { width: 20px; height: 20px; margin-right: 10px; border-radius: 4px; }
        .gris { background: #888; }
        .rojo { background: #ff4444; }
        .azul { background: #4444ff; }
        .verde { background: #44ff44; border: 2px dashed #00aa00; }
        #resultados-busqueda { max-height: 150px; overflow-y: auto; background: white; border: 1px solid #ddd; }
        .resultado-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
        .resultado-item:hover { background: #f0f0f0; }
        #tabla-cambios { max-height: 200px; overflow-y: auto; background: white; border: 1px solid #ddd; padding: 10px; }
        .info-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 20px rgba(0,0,0,0.2); z-index: 2000; max-width: 400px; width: 90%; }
        .popup-content { position: relative; }
        .close { position: absolute; top: -10px; right: -10px; font-size: 24px; cursor: pointer; }
        .close:hover { color: #333; }
        #info-tabla { width: 100%; border-collapse: collapse; margin-top: 15px; }
        #info-tabla th, #info-tabla td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        #info-tabla th { background: #f2f2f2; width: 40%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Visor de Concesiones Mineras</h2>
            
            <div class="search-section">
                <h3>Buscador</h3>
                <input type="text" id="buscador" placeholder="Buscar por código, nombre, titular...">
                <button onclick="buscarConcesion()">Buscar</button>
                <div id="resultados-busqueda"></div>
            </div>
            
            <div class="leyenda-section">
                <h3>Leyenda</h3>
                <div class="leyenda-item"><span class="color-box gris"></span> Sin cambios</div>
                <div class="leyenda-item"><span class="color-box rojo"></span> Desapareció</div>
                <div class="leyenda-item"><span class="color-box azul"></span> Apareció</div>
                <div class="leyenda-item"><span class="color-box verde"></span> Búsqueda/Área</div>
            </div>
            
            <div class="carga-archivos">
                <h3>Cargar área de interés</h3>
                <input type="file" id="archivo-input" accept=".geojson">
                <button onclick="cargarArchivo()">Cargar</button>
                <div>
                    <input type="text" id="coordenadas-texto" placeholder="Ej: -9.5, -75.5">
                    <button onclick="buscarCoordenadas()">Ir</button>
                </div>
            </div>
            
            <div class="cambios-section">
                <h3>Últimos cambios</h3>
                <div id="tabla-cambios">Cargando cambios...</div>
            </div>
        </div>
        
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>
    
    <div id="info-popup" class="info-popup">
        <div class="popup-content">
            <span class="close" onclick="cerrarPopup()">&times;</span>
            <h3>Detalles de la Concesión</h3>
            <table id="info-tabla">
                <tr><th>Código</th><td id="info-codigo"></td></tr>
                <tr><th>Fecha Denuncio</th><td id="info-fecha"></td></tr>
                <tr><th>Concesión</th><td id="info-concesion"></td></tr>
                <tr><th>Titular</th><td id="info-titular"></td></tr>
            </table>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <script src="app.js"></script>
</body>
</html>
