name: Actualizar Datos

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install adm-zip fs-extra node-fetch shapefile
      - run: node scripts/actualizar-shapefiles.js
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática"
          git push