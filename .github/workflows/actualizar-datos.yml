name: Actualizar Datos Mineros

on:
  schedule:
    - cron: '0 1 * * *'   # 01 UTC
    - cron: '0 6 * * *'   # 06 UTC
    - cron: '0 11 * * *'  # 11 UTC
    - cron: '0 16 * * *'  # 16 UTC
    - cron: '0 21 * * *'  # 21 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  actualizar:
    runs-on: ubuntu-latest
    # Permisos necesarios para hacer push
    permissions:
      contents: write
      
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Instalar dependencias
        run: npm install adm-zip fs-extra node-fetch shapefile
        
      - name: Ejecutar script de actualización
        run: node scripts/actualizar-shapefiles.js
        
      - name: Verificar cambios y subir
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Forzar adición de archivos nuevos/modificados
          git add -f data/
          
          # Verificar si hay cambios
          if git diff --cached --quiet; then
            echo "✅ No hay cambios nuevos. Saliendo sin errores."
            exit 0
          fi
          
          # Mostrar qué archivos se van a commitear
          echo "📦 Archivos a commitear:"
          git diff --cached --name-only
          
          # Hacer commit
          git commit -m "Actualización automática $(date +'%d%m%y_%H%M')"
          
          # Hacer push (con reintentos)
          echo "🚀 Subiendo cambios..."
          git pull --rebase origin main
          git push
          
          echo "✅ Cambios subidos exitosamente"